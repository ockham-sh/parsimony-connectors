[project]
name = "parsimony-connectors-workspace"
version = "0.0.0"
description = "Workspace root for the parsimony connectors monorepo. Not published."
requires-python = ">=3.11"

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
# The kernel's new contract v1 surface (parsimony.testing, Catalog.from_url,
# CONTRACT_VERSION) is not yet on PyPI — the 0.1.0a1 release predates the
# rewrite. Until the kernel ships a new alpha, both local dev and CI resolve
# parsimony-core from the sibling `ockham-sh/parsimony` checkout at `../parsimony`.
# CI achieves this by checking out both repos side-by-side (see ci.yml).
# Flip to PyPI by removing this override once parsimony-core>=0.2 ships.
parsimony-core = { path = "../parsimony", editable = true }

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true

# The financial_reports SDK (financial_reports_generated_client) ships a
# module with a syntax error we stub out at runtime. Skip-follow imports
# into the SDK so mypy doesn't parse the broken file.
[[tool.mypy.overrides]]
module = "financial_reports_generated_client.*"
follow_imports = "skip"

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -m 'not integration'"
asyncio_mode = "auto"
markers = [
    "integration: hits live APIs (may be slow, requires env vars)",
    "slow: long-running test (subprocess / heavy I/O)",
]
