name: Integration

# Weekly cron + manual dispatch. Integration tests hit live upstream APIs
# and therefore need real credentials — they're NOT run on every push/PR.
# A failure here typically indicates an upstream API breaking change, a
# credential rotation, or a rate-limit issue — not a PR regression.

on:
  schedule:
    - cron: "7 6 * * 1"  # Mondays 06:07 UTC
  workflow_dispatch:
    inputs:
      packages:
        description: "Comma-separated list of package names to test (empty = all)"
        required: false
        default: ""

concurrency:
  group: integration
  cancel-in-progress: false

permissions:
  contents: read

env:
  KERNEL_REPO: ockham-sh/parsimony
  KERNEL_REF: main

jobs:
  integration:
    name: Integration — live APIs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          path: parsimony-connectors

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_REF }}
          path: parsimony

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync workspace
        working-directory: parsimony-connectors
        run: uv sync --all-extras --all-packages

      - name: Integration tests
        working-directory: parsimony-connectors
        env:
          # Every secret below is optional — missing credentials cause the
          # corresponding tests to `pytest.skip`, not fail. Rotate via
          # GitHub repo → Settings → Secrets and variables → Actions.
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          BANQUEDEFRANCE_KEY: ${{ secrets.BANQUEDEFRANCE_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          DESTATIS_USERNAME: ${{ secrets.DESTATIS_USERNAME }}
          DESTATIS_PASSWORD: ${{ secrets.DESTATIS_PASSWORD }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          FINANCIAL_REPORTS_API_KEY: ${{ secrets.FINANCIAL_REPORTS_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RIKSBANK_API_KEY: ${{ secrets.RIKSBANK_API_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          # SEC EDGAR requires a User-Agent — edgartools handles it.
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
        run: |
          set -euo pipefail
          targets="${{ github.event.inputs.packages }}"
          if [ -n "$targets" ]; then
            IFS=',' read -ra PKGS <<< "$targets"
            for pkg in "${PKGS[@]}"; do
              pkg_trimmed=$(echo "$pkg" | xargs)
              echo "::group::integration — $pkg_trimmed"
              uv run pytest "packages/$pkg_trimmed" -m integration -v --tb=short
              echo "::endgroup::"
            done
          else
            uv run pytest -m integration -v --tb=short
          fi

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-logs
          path: |
            parsimony-connectors/.pytest_cache/
            parsimony-connectors/**/*.log
          retention-days: 14
