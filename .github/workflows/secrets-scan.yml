name: Secrets scan

# Cheap regex gate: rejects common API-key shapes in any committed file under
# packages/. Runs on every PR to main. Not a substitute for upstream secret
# scanning (Gitleaks/TruffleHog) but catches the "respx cassette with live
# header" pattern before it reaches the main branch.

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/**"

permissions:
  contents: read

jobs:
  scan:
    name: Regex scan for likely credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: changed
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          git diff --name-only --diff-filter=ACMR "$base" "$head" -- 'packages/' > /tmp/changed.txt || true
          count=$(wc -l < /tmp/changed.txt || echo 0)
          echo "count=${count}" >> "$GITHUB_OUTPUT"

      - name: Scan for API-key / token patterns
        if: steps.changed.outputs.count != '0'
        run: |
          set -euo pipefail
          # Patterns chosen to catch common leaks in test fixtures and sample
          # configs. False positives are accepted; the fix is to rename the
          # variable or add an inline waiver comment.
          #   - 32+ char alphanumeric values assigned to *_key / *_token / *_secret
          #   - Authorization: Bearer <token>
          #   - api_key= / apikey= / token= with long opaque string in a URL or query
          patterns=(
            '(?i)(api[_-]?key|access[_-]?token|secret|client[_-]?secret)\s*[:=]\s*["'\'']\s*[A-Za-z0-9_\-]{32,}\s*["'\'']'
            '(?i)authorization:\s*bearer\s+[A-Za-z0-9_\-\.]{20,}'
            '(?i)[?&](api[_-]?key|apikey|access_token|token)=[A-Za-z0-9_\-]{20,}'
          )
          status=0
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            [[ ! -f "$file" ]] && continue
            for pat in "${patterns[@]}"; do
              if grep -nP -- "$pat" "$file" >/tmp/hit 2>/dev/null; then
                if grep -qv '# secret-scan: allow' /tmp/hit; then
                  echo "::error file=$file::likely credential leak (pattern: $pat)"
                  cat /tmp/hit
                  status=1
                fi
              fi
            done
          done < /tmp/changed.txt
          exit $status
