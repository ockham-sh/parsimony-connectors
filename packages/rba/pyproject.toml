[project]
name = "parsimony-rba"
version = "0.0.1"
description = "Reserve Bank of Australia connector for the parsimony framework"
authors = [{ name = "Ockham.sh", email = "team@ockham.sh" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
keywords = ["finance", "data", "connectors", "parsimony", "rba"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "parsimony-core[catalog]>=0.0.1",
    "pydantic>=2.11.1,<3",
    "pandas>=2.3.0,<3",
    # openpyxl/xlrd parse the XLSX/XLS workbooks under
    # /statistics/tables/xls/ and /statistics/tables/xls-hist/ that carry
    # ~200 series the CSV index doesn't expose (Bond Purchase Program,
    # discontinued b3/c9/e4-e7/f16 histories). Pure-Python, tiny.
    "openpyxl>=3.1.5",
    "xlrd>=2.0.2",
    # curl_cffi is a HARD dependency: RBA fronts its CDN with Akamai
    # bot-mitigation that 403s stock httpx TLS fingerprints. The connector
    # impersonates Chrome via curl_cffi; without it every live request fails.
    "curl_cffi>=0.7,<1",
]

[project.optional-dependencies]
# curl_cffi moved to the hard dependency list above — the Akamai TLS
# fingerprint block makes it required, not optional, for any real request.
recommended = []
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=5.0",
    "respx>=0.22.0",
    "ruff>=0.15.10",
    "mypy>=1.10",
]

[project.urls]
Homepage = "https://www.rba.gov.au"
Repository = "https://github.com/ockham-sh/parsimony-connectors"
Issues = "https://github.com/ockham-sh/parsimony-connectors/issues"

[project.entry-points."parsimony.providers"]
rba = "parsimony_rba"


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["parsimony_rba"]

[tool.hatch.build.targets.sdist]
include = ["parsimony_rba", "README.md", "LICENSE", "CHANGELOG.md"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
# Publish scripts call logging.basicConfig() before importing parsimony so
# the kernel's INFO logs surface during the long-running publish pipeline.
"scripts/*" = ["E402"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -m 'not integration'"
markers = [
    "integration: hits live APIs (may be slow, requires env vars)",
]
