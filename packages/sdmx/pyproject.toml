[project]
name = "parsimony-sdmx"
version = "0.4.0"
description = "SDMX protocol connector (ECB, Eurostat, IMF, OECD, BIS, World Bank, ILO) for the parsimony framework"
authors = [{ name = "Ockham.sh", email = "team@ockham.sh" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
keywords = ["finance", "data", "connectors", "parsimony", "sdmx"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "parsimony-core>=0.4.0,<0.5",
    "pydantic>=2.11.1,<3",
    "pandas>=2.3.0,<3",
    "pyarrow>=16.0",
    "sdmx1>=2.16",
    "requests>=2.32",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "psutil>=5.9",
]

[project.optional-dependencies]
# Heavy deps for running the HF catalog publisher under scripts/. Kept
# behind an extra so `pip install parsimony-sdmx` stays lean — only catalog
# maintainers ever need parsimony-core[standard-onnx] (faiss + onnxruntime
# + sentence-transformers + FragmentEmbeddingCache for cross-agency
# fragment amortization in the overnight ESTAT/IMF/WB chain).
publish = [
    "parsimony-core[standard-onnx]>=0.4.0,<0.5",
]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=5.0",
    "respx>=0.22.0",
    "ruff>=0.15.10",
    "mypy>=1.10",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://sdmx.org"
Repository = "https://github.com/ockham-sh/parsimony-connectors"
Issues = "https://github.com/ockham-sh/parsimony-connectors/issues"

[project.entry-points."parsimony.providers"]
sdmx = "parsimony_sdmx"


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["parsimony_sdmx"]

[tool.hatch.build.targets.sdist]
include = ["parsimony_sdmx", "README.md", "LICENSE", "CHANGELOG.md"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
# Publish + smoke scripts call logging.basicConfig() before importing
# parsimony so the kernel's INFO logs surface during the long-running
# publish pipeline.
"scripts/*" = ["E402"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -m 'not integration and not slow'"
asyncio_mode = "auto"
markers = [
    "integration: hits live APIs (may be slow, requires env vars)",
    "slow: spawns real subprocesses / large payloads (excluded from default run)",
]
