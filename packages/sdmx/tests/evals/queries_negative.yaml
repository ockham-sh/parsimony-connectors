# Probes where the expected code is NOT returned by catalog search (even at limit 500).
# Use for retrieval-gap diagnostics only — do not mix into rerank or recall evals.

dataset_title_nl:
  - id: euro_yield_curve
    query: "Euro area government bond yield curve"
    namespace: sdmx_datasets_ecb
    expected: "ECB|YC"
    notes: "Many ECB flows; YC may not rank in top-500 NL search within agency catalog."

  - id: hicp_annual_rate
    query: "harmonised consumer prices annual rate of change monthly"
    namespace: sdmx_datasets_estat
    expected: "ESTAT|PRC_HICP_MANR"
    notes: "Many HICP flows; MANR not in top-500."

  - id: ecb_yield_short
    query: "ECB yield curve"
    namespace: sdmx_datasets_ecb
    expected: "ECB|YC"
    notes: "Same retrieval gap as euro_yield_curve."

thresholds:
  min_required_recall: 0.0
