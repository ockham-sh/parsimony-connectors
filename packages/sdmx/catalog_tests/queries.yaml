# Curated probes for SDMX dataset + series catalogs.
#
# Workflow:
#   sdmx_datasets_search(query=...)
#   -> sdmx_series_search(agency=..., dataset_id=..., query=...)
#   -> sdmx_dimension_search(agency=..., dataset_id=..., dimension=...)
#   -> sdmx_fetch

catalog_root: hf://parsimony-dev/sdmx

queries:
  - id: dataset_code_ecb_yc
    query: "code: ECB|YC"
    namespace: sdmx_datasets_ecb
    expected_code: ECB|YC
    mode: structured_field
    required: true
    why: "Per-agency datasets catalog; structured code lookup"

  - id: dataset_title_ecb_yield
    query: "yield curve"
    namespace: sdmx_datasets_ecb
    expected_code: ECB|YC
    mode: title_bm25
    optional: true
    why: "Title probe on ECB agency dataset catalog"

thresholds:
  min_required_recall: 1.0
