[project]
name = "parsimony-shared"
version = "0.6.0"
description = "Internal shared helpers for parsimony connector packages. Not published."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["parsimony_shared"]
